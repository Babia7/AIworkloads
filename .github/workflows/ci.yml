name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-networking-education-center
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ai-networking-education-center/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test
      - run: npx playwright install --with-deps chromium
      # Push to main: regenerate linux baselines and commit back (bootstraps first run,
      # keeps baselines current so future PRs can diff against them)
      - name: Update visual baselines
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx playwright test --update-snapshots
      - name: Commit updated linux visual baselines
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-networking-education-center/e2e/visual.spec.ts-snapshots/
          if git diff --staged --quiet; then
            echo "No baseline changes to commit"
          else
            git commit -m "chore(e2e): update linux visual baselines [skip ci]"
            git push
          fi
      # PRs: compare against committed baselines for visual regression detection
      - name: Run e2e tests
        if: github.event_name == 'pull_request'
        run: npm run test:e2e
